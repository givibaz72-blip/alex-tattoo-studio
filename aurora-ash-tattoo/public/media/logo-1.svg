<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="300" fill="#0B0B0B"/>

  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F5E6B3"/>
      <stop offset="50%" stop-color="#C8A96B"/>
      <stop offset="100%" stop-color="#8C6A3B"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <text
    x="50%"
    y="52%"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Playfair Display', serif"
    font-size="92"
    letter-spacing="8"
    fill="url(#gold)"
    filter="url(#glow)">
    AURORA &amp; ASH
  </text>

  <line x1="180" y1="210" x2="450" y2="210" stroke="url(#gold)" stroke-width="1"/>
  <line x1="750" y1="210" x2="1020" y2="210" stroke="url(#gold)" stroke-width="1"/>
</svg>